apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  interval: 10m
  chart:
    spec:
      chart: ingress-nginx
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controller:
      service:
        type: LoadBalancer
        annotations:
          bgp: public
          dns.mikrotik/enabled: "true"
          dns.mikrotik/hostname: "photo.internal.bellee.net"
          dns.mikrotik/comment: "Ingress for photo stack"
      ingressClassResource:
        name: nginx
        enabled: true
        default: false
