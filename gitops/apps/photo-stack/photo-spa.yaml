apiVersion: apps/v1
kind: Deployment
metadata:
  name: photo-spa
  namespace: photo
  labels:
    app: photo-spa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: photo-spa
  template:
    metadata:
      labels:
        app: photo-spa
    spec:
      containers:
        - name: photo-spa
          image: ghcr.io/cbellee/photo-spa:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: photo-spa
  namespace: photo
  labels:
    app: photo-spa
spec:
  type: ClusterIP
  selector:
    app: photo-spa
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: photo-spa
  namespace: photo
  annotations:
    cert-manager.io/cluster-issuer: internal-ca
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - photo.internal.bellee.net
      secretName: photo-spa-tls
  rules:
    - host: photo.internal.bellee.net
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: photo-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: photo-spa
                port:
                  number: 80
