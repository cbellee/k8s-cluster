apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: platform
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/apps
  wait: true
  timeout: 5m
