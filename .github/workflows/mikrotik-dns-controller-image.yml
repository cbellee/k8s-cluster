name: Build and Publish MikroTik DNS Controller Image

on:
  push:
    branches:
      - main
    paths:
      - mikrotik-dns-controller/**
      - .github/workflows/mikrotik-dns-controller-image.yml
  pull_request:
    paths:
      - mikrotik-dns-controller/**
      - .github/workflows/mikrotik-dns-controller-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build container image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mikrotik-dns-controller
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./mikrotik-dns-controller
          file: ./mikrotik-dns-controller/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
