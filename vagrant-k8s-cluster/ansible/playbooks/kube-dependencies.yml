- hosts: all
  become: true
  tasks:
    - name: Update apt cache
      apt:
        update_cache: true

    - name: Disable swap at runtime
      command: swapoff -a
      changed_when: false

    - name: Disable swap in fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: Ensure required kernel modules are configured
      blockinfile:
        path: /etc/modules-load.d/k8s.conf
        create: true
        block: |
          overlay
          br_netfilter

    - name: Load required kernel modules
      shell: |
        modprobe overlay
        modprobe br_netfilter

    - name: Configure sysctl for Kubernetes networking
      blockinfile:
        path: /etc/sysctl.d/k8s.conf
        create: true
        block: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: Apply sysctl settings
      command: sysctl --system

    - name: Install base packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
          - jq
          - ipvsadm
        state: present
        update_cache: true
      ignore_errors: true

    - name: Set hostname
      hostname:
        name: "{{ inventory_hostname }}"

    - name: Manage cluster hosts block
      blockinfile:
        path: /etc/hosts
        marker: "# {mark} K8S_CLUSTER_HOSTS"
        block: |
          {{ cp_endpoint_ip }} {{ cp_endpoint_alias }} {{ cp_endpoint_node }}
          {% for host in groups['control_plane'] %}
          {{ hostvars[host].ansible_host }} {{ host }}
          {% endfor %}
          {% for host in groups['workers'] %}
          {{ hostvars[host].ansible_host }} {{ host }}
          {% endfor %}

    - name: Ensure keyrings directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Install Docker apt key for containerd.io
      shell: curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      apt_repository:
        filename: docker
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"

    - name: Install Kubernetes apt key
      shell: curl -fsSL {{ k8s_url_apt_key }} | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes apt repository
      apt_repository:
        filename: kubernetes
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] {{ k8s_repo }} /"

    - name: Install containerd.io
      apt:
        name: containerd.io
        state: present
        update_cache: true

    - name: Generate default containerd config
      shell: |
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Ensure CRI plugin is enabled in containerd config
      replace:
        path: /etc/containerd/config.toml
        regexp: '^disabled_plugins = \["cri"\]$'
        replace: ''

    - name: Set SystemdCgroup for containerd
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Restart and enable containerd
      systemd:
        name: containerd
        state: restarted
        enabled: true

    - name: Install Kubernetes packages
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
          - kubernetes-cni
        state: present
        update_cache: true

    - name: Hold Kubernetes packages
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Ensure kubelet enabled
      systemd:
        name: kubelet
        state: started
        enabled: true
