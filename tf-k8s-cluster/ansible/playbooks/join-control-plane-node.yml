- hosts: primary_control_plane
  become: true
  tasks:
    - name: Generate join command
      become_user: ubuntu
      shell: kubeadm token create --print-join-command
      register: join_command_raw

    - name: Upload certs and capture certificate key
      become_user: ubuntu
      shell: kubeadm init phase upload-certs --upload-certs | tail -n 1
      register: cert_key_raw

    - name: Set join facts
      set_fact:
        join_command: "{{ join_command_raw.stdout }}"
        cert_key: "{{ cert_key_raw.stdout }}"

- hosts: all
  become: true
  vars:
    primary_cp_host: "{{ groups['primary_control_plane'][0] }}"
  tasks:
    - name: Fail if target_node is not provided
      ansible.builtin.fail:
        msg: "target_node is required (for example: -e target_node=kube-cp-02)"
      when: target_node is not defined

    - name: Join control-plane node
      shell: |
        {{ hostvars[primary_cp_host].join_command }} \
          --control-plane \
          --certificate-key {{ hostvars[primary_cp_host].cert_key }} \
          --node-name={{ inventory_hostname }} \
          --cri-socket={{ cri_socket }} \
          --v=5 > /root/kubeadm_cp_join.txt
      when: target_node is defined and inventory_hostname == target_node

    - name: Configure kubeconfig for ubuntu
      become_user: ubuntu
      block:
        - name: Ensure .kube exists
          file:
            path: /home/ubuntu/.kube
            state: directory
            mode: '0755'

        - name: Copy admin.conf
          copy:
            src: /etc/kubernetes/admin.conf
            dest: /home/ubuntu/.kube/config
            owner: ubuntu
            group: ubuntu
            mode: '0600'
            remote_src: true
      when: target_node is defined and inventory_hostname == target_node
