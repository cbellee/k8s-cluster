- hosts: all
  become: true
  vars:
    k8s_channel_effective: "{{ k8s_channel | default('1.35') }}"
    k8s_repo_effective: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_channel_effective }}/deb/"
    k8s_key_effective: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_channel_effective }}/deb/Release.key"
  tasks:
    - name: Unhold Kubernetes packages
      shell: apt-mark unhold kubeadm kubelet kubectl || true

    - name: Refresh Kubernetes apt key for selected channel
      shell: curl -fsSL {{ k8s_key_effective }} | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Refresh Kubernetes apt repository for selected channel
      apt_repository:
        filename: kubernetes
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] {{ k8s_repo_effective }} /"

    - name: Upgrade Kubernetes packages from selected channel
      apt:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: latest
        update_cache: true

    - name: Hold Kubernetes packages
      shell: apt-mark hold kubeadm kubelet kubectl
