apiVersion: v1
kind: Namespace
metadata:
  name: mikrotik-dns-controller

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mikrotik-dns-controller
  namespace: mikrotik-dns-controller

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mikrotik-dns-controller
rules:
# Read services from all namespaces
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch"]
# Read service status
- apiGroups: [""]
  resources: ["services/status"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mikrotik-dns-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mikrotik-dns-controller
subjects:
- kind: ServiceAccount
  name: mikrotik-dns-controller
  namespace: mikrotik-dns-controller
